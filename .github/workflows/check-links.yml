name: Check Links

on:
  schedule:
    - cron: '0 6 * * 1'  # Cada lunes a las 6 AM UTC
  workflow_dispatch:      # Permite correr manualmente
  push:
    paths:
      - '**.md'
      - '.github/workflows/check-links.yml'

jobs:
  lychee:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Restore lychee cache
        uses: actions/cache@v4
        with:
          path: .lycheecache
          key: cache-lychee-${{ github.sha }}
          restore-keys: cache-lychee-

      - name: Link Checker
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --cache
            --max-cache-age 7d
            --accept 200,201,202,203,204,206,301,302,303,307,308,403,429,999
            --exclude-path "10-PDFs-y-Libros/descargas"
            --exclude "tu-url.vercel.app"
            './**/*.md'
          fail: false
          output: ./lychee-report.md

      - name: Create issue if links broken
        if: env.lychee_exit_code != '0'
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: 'Link checker reportó URLs rotas'
          content-filepath: ./lychee-report.md
          labels: |
            broken-links
            automated
