name: Build PDF

on:
  push:
    branches: [main]
    paths:
      - '**.md'
      - '.github/workflows/build-pdf.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install md-to-pdf
        run: npm install -g md-to-pdf

      - name: Concatenate all markdown files in order
        run: |
          mkdir -p _build
          {
            echo "---"
            echo "pdf_options:"
            echo "  format: A4"
            echo "  margin: 20mm"
            echo "  printBackground: true"
            echo "stylesheet: style.css"
            echo "---"
            echo ""
            echo "# 🚀 Guía Dev Completo"
            echo ""
            echo "> Versión PDF · generado automáticamente desde [github.com/SrBemi-prog/Guia-Dev-Completo](https://github.com/SrBemi-prog/Guia-Dev-Completo)"
            echo ""
            echo "<div class='pagebreak'></div>"
            echo ""

            cat README.md
            echo ""
            echo "<div class='pagebreak'></div>"
            echo ""

            # Ordenar carpetas numeradas
            for dir in $(ls -d [0-9]*/ 2>/dev/null | sort); do
              if [ -f "${dir}README.md" ]; then
                cat "${dir}README.md"
                echo ""
                echo "<div class='pagebreak'></div>"
                echo ""
              fi
            done

            # Archivos especiales
            for f in TECH-STACK-2026.md GLOSARIO.md PREGUNTAS-FRECUENTES.md PROGRESO.md LINKS.md; do
              if [ -f "$f" ]; then
                cat "$f"
                echo ""
                echo "<div class='pagebreak'></div>"
                echo ""
              fi
            done

            # Cheatsheets
            if [ -d cheatsheets ]; then
              echo "# 📋 Cheatsheets"
              echo ""
              echo "<div class='pagebreak'></div>"
              echo ""
              for f in cheatsheets/*.md; do
                if [ "$(basename $f)" != "README.md" ]; then
                  cat "$f"
                  echo ""
                  echo "<div class='pagebreak'></div>"
                  echo ""
                fi
              done
            fi

            # Templates
            if [ -f templates/README.md ]; then
              cat templates/README.md
            fi
          } > _build/guia-completa.md

      - name: Create custom stylesheet
        run: |
          cat > _build/style.css << 'CSS'
          body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
            font-size: 11pt;
            line-height: 1.5;
            color: #1f2328;
            max-width: 100%;
          }
          h1 { font-size: 28pt; border-bottom: 2px solid #d0d7de; padding-bottom: 0.3em; color: #0969da; }
          h2 { font-size: 20pt; border-bottom: 1px solid #d0d7de; padding-bottom: 0.3em; margin-top: 1.5em; }
          h3 { font-size: 16pt; margin-top: 1.2em; }
          h4 { font-size: 13pt; }
          code {
            background: #f6f8fa;
            padding: 2px 4px;
            border-radius: 3px;
            font-family: "SF Mono", Monaco, Consolas, "Courier New", monospace;
            font-size: 9.5pt;
            color: #cf222e;
          }
          pre {
            background: #f6f8fa;
            padding: 12px;
            border-radius: 6px;
            overflow-x: auto;
            border: 1px solid #d0d7de;
          }
          pre code {
            background: transparent;
            padding: 0;
            color: #1f2328;
            font-size: 9pt;
          }
          table { border-collapse: collapse; width: 100%; margin: 10px 0; }
          th, td { border: 1px solid #d0d7de; padding: 6px 12px; text-align: left; font-size: 10pt; }
          th { background: #f6f8fa; font-weight: 600; }
          blockquote {
            border-left: 4px solid #d0d7de;
            padding-left: 16px;
            color: #57606a;
            margin-left: 0;
          }
          a { color: #0969da; text-decoration: none; }
          .pagebreak { page-break-after: always; }
          img { max-width: 100%; }
          CSS

      - name: Build PDF
        run: |
          cd _build
          md-to-pdf guia-completa.md --launch-options '{ "args": ["--no-sandbox"] }'
          mv guia-completa.pdf guia-dev-completo.pdf
          ls -lh guia-dev-completo.pdf

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: guia-dev-completo-pdf
          path: _build/guia-dev-completo.pdf
          retention-days: 90

      - name: Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-pdf
          name: 'PDF — Guía completa'
          body: |
            📄 PDF actualizado automáticamente con el último contenido de la guía.

            **Última actualización:** ${{ github.event.head_commit.timestamp }}
            **Commit:** ${{ github.sha }}
          files: _build/guia-dev-completo.pdf
          prerelease: false
          make_latest: true
